<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cultivating the Fruit</title>
  <script>
    (function() {
      function getCookie(name) {
        var match = document.cookie.match(new RegExp('(?:^|; )' + name + '=([^;]*)'));
        return match ? decodeURIComponent(match[1]) : null;
      }
      function setCookie(name, value) {
        var expires = new Date();
        expires.setFullYear(expires.getFullYear() + 1);
        document.cookie = name + '=' + encodeURIComponent(value) +
          '; expires=' + expires.toUTCString() +
          '; path=/; SameSite=Lax';
      }

      // Manual override for testing: ?v=v2 or ?v=v3 forces a specific variant
      // (handy for sharing a specific page link with someone)
      var urlParams = new URLSearchParams(window.location.search);
      var override = urlParams.get('v');
      var variant;

      if (override === 'v2' || override === 'v3') {
        variant = override;
      } else {
        // Check for existing assignment so return visitors are sticky
        variant = getCookie('ctf_ab_variant');
        // New visitor → assign randomly 50/50
        if (variant !== 'v2' && variant !== 'v3') {
          variant = Math.random() < 0.5 ? 'v2' : 'v3';
          setCookie('ctf_ab_variant', variant);
        }
      }

      // Preserve any other query params (UTM tags, fbclid, etc.) for downstream attribution
      urlParams.delete('v');
      var query = urlParams.toString();
      var dest = '/strengthen-wives/' + variant + '/' + (query ? '?' + query : '');
      window.location.replace(dest);
    })();
  </script>
</head>
<body>
  <noscript>
    <p>Please enable JavaScript or <a href="/strengthen-wives/v2/">continue here</a>.</p>
  </noscript>
</body>
</html>
