<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cultivating the Fruit</title>
  <script>
    (function() {
      function getCookie(name) {
        var match = document.cookie.match(new RegExp('(?:^|; )' + name + '=([^;]*)'));
        return match ? decodeURIComponent(match[1]) : null;
      }
      function setCookie(name, value) {
        var expires = new Date();
        expires.setFullYear(expires.getFullYear() + 1);
        document.cookie = name + '=' + encodeURIComponent(value) +
          '; expires=' + expires.toUTCString() +
          '; path=/; SameSite=Lax';
      }

      var urlParams = new URLSearchParams(window.location.search);
      var override = urlParams.get('v');
      var variant;

      if (override === 'v2' || override === 'v3' || override === 'v4') {
        variant = override;
      } else {
        variant = getCookie('ctf_ab_variant');
        if (variant !== 'v2' && variant !== 'v3' && variant !== 'v4') {
          // 3-way counter rotation using a separate cookie
          var count = parseInt(getCookie('ctf_visit_count') || '0', 10);
          var variants = ['v2', 'v3', 'v4'];
          variant = variants[count % 3];
          setCookie('ctf_visit_count', String(count + 1));
          setCookie('ctf_ab_variant', variant);
        }
      }

      urlParams.delete('v');
      var query = urlParams.toString();
      var dest = '/strengthen-wives/' + variant + '/' + (query ? '?' + query : '');
      window.location.replace(dest);
    })();
  </script>
</head>
<body>
  <noscript>
    <p>Please enable JavaScript or <a href="/strengthen-wives/v2/">continue here</a>.</p>
  </noscript>
</body>
</html>
