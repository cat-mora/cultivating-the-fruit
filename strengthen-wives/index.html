<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cultivating the Fruit</title>
<script>
  (function() {
    var count = parseInt(localStorage.getItem('ctf_ab_count') || '0');
    count++;
    localStorage.setItem('ctf_ab_count', count);
    var dest = (count % 2 === 1)
      ? '/strengthen-wives/v2/'
      : '/strengthen-wives/v3/';
    window.location.replace(dest);
  })();
</script>
</head>
<body></body>
</html>
